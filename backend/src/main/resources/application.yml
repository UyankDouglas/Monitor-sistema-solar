spring:
  application:
    name: monitor-solar-deye

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/solar}
    username: ${SPRING_DATASOURCE_USERNAME:solar}
    password: ${SPRING_DATASOURCE_PASSWORD:solar}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

# Configurações de domínio (bindadas em etapas futuras).
app:
  scheduler:
    # Intervalo padrão de leitura do inversor (ms). Reconfigurável em runtime na Etapa 4.
    reading-interval-ms: 5000
  energy:
    default-currency: BRL
    default-kwh-price: 0.95
    co2-factor-kg-per-kwh: 0.0817

logging:
  level:
    com.solarmonitor: INFO
