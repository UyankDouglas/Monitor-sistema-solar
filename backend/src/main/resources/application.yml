spring:
  application:
    name: monitor-solar-deye

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/solar}
    username: ${SPRING_DATASOURCE_USERNAME:solar}
    password: ${SPRING_DATASOURCE_PASSWORD:solar}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

# Configurações estáticas da aplicação. As dinâmicas (intervalo de leitura,
# modo do provider, credenciais) vivem na tabela `configurations` e são
# editáveis em runtime pela tela de Configurações.
app:
  security:
    jwt:
      # HS256 exige >= 32 bytes. Em produção defina JWT_SECRET no ambiente
      # (docker-compose já injeta); o default só serve para dev local.
      secret: ${JWT_SECRET:dev-secret-inseguro-trocar-em-producao-0123456789abcdef}
      access-ttl-minutes: 15
      refresh-ttl-days: 30
  scheduler:
    # Liga/desliga o agendador de ingestão (testes usam false). O INTERVALO
    # vem do banco: configurations['scheduler.reading-interval-ms'].
    enabled: true
  solarman:
    cloud:
      # Host global da Solarman OpenAPI (não é segredo; credenciais ficam no banco).
      base-url: https://globalapi.solarmanpv.com
  energy:
    default-currency: BRL
    default-kwh-price: 0.95
    co2-factor-kg-per-kwh: 0.0817

logging:
  level:
    com.solarmonitor: INFO
