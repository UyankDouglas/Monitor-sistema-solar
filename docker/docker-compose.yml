services:
  postgres:
    image: timescale/timescaledb:2.17.2-pg16
    container_name: solar-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-solar}
      POSTGRES_USER: ${POSTGRES_USER:-solar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-solar}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-solar} -d ${POSTGRES_DB:-solar}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: solar-pgadmin
    environment:
      # pgAdmin valida o TLD do e-mail — domínios ".local" são rejeitados.
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@solar.dev}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    depends_on:
      - postgres
    restart: unless-stopped

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: solar-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-solar}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-solar}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-solar}
      JWT_SECRET: ${JWT_SECRET:-troque-este-segredo-em-producao-32-bytes-min!}
      JAVA_OPTS: "-XX:MaxRAMPercentage=75"
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: solar-frontend
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
